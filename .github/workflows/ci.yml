name: CI

on:
  push:
    branches:
      - main
      - 'anf/codex/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Repository and toolchain setup.
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # Keep the CI validation order aligned with `pnpm release:validate`.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Benchmark Smoke
        run: pnpm benchmark:smoke
