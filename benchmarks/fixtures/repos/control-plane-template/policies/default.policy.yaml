version: 1
name: benchmark-default
defaults:
  sandbox_mode: workspace-write
  network_access: false
  approval_policy: on-request
  fallback_decision: prompt
rules:
  - id: docs-safe
    match:
      task_classes: [docs, release_notes, triage]
      paths: ["docs/**", "README.md", "CHANGELOG.md", "benchmarks/**", "documentation.md"]
      actions: [read, write]
    decision: allow
  - id: tests-safe
    match:
      task_classes: [tests]
      paths:
        - "apps/**/tests/**"
        - "apps/**/*.test.ts"
        - "apps/**/*.test.tsx"
        - "apps/web/playwright.config.ts"
        - "packages/**/tests/**"
        - "packages/**/*.test.ts"
      actions: [read, write]
    decision: allow
  - id: ci-safe
    match:
      task_classes: [ci]
      paths:
        - ".github/workflows/**"
        - "gdh.config.json"
        - "package.json"
        - "biome.json"
      actions: [read, write]
    decision: allow
  - id: governed-control-plane-refactor
    match:
      task_classes: [refactor]
      paths:
        - "apps/cli/**"
        - "apps/web/**"
        - "packages/artifact-store/**"
        - "packages/shared/**"
        - "packages/verification/**"
        - "docs/**"
        - "README.md"
      actions: [read, write]
    decision: allow
  - id: auth-protected
    match:
      paths: ["src/auth/**"]
      actions: [write]
    decision: prompt
    reason: Auth changes require approval.
  - id: migrations-protected
    match:
      paths: ["db/migrations/**"]
      actions: [write]
    decision: prompt
    reason: Migration changes require approval.
  - id: secrets-forbidden
    match:
      paths: [".env", ".env.*"]
      actions: [read, write, secrets_touch]
    decision: forbid
    reason: Secrets are forbidden.
