version: 1
id: smoke-policy-prompt
title: Prompt-worthy policy path pauses for approval
description: Exercises the approval boundary for protected auth paths without executing writes.
metadata:
  sourceType: manual_curation
  sourceProvenance:
    summary: Original Phase 6 smoke seed for an approval-gated protected path.
    references:
      - documentation.md:42
      - docs/decisions/0006-phase-6-benchmarking-regression-gating.md
  collectionDate: 2026-03-17
  acceptedDate: 2026-03-23
  taskClass: docs
  riskClass: medium
  successCriteria:
    - Detect the protected-path edit before runner execution.
    - Persist the approval packet and pause with pending approval state.
  allowedPolicies:
    - prompt
  expectedVerificationCommands: []
  graders:
    - { name: task_completion, metric: success, notes: "Awaiting approval is the expected terminal state." }
    - { name: policy_violations, metric: policy_correctness }
    - { name: review_packet_fidelity, metric: packet_completeness }
    - { name: artifact_completeness, metric: artifact_presence }
    - { name: human_intervention_count, notes: "One human approval should be required." }
  simplificationNotes:
    - Uses a deterministic fixture auth path rather than a live protected subsystem.
  contaminationNotes:
    - Approval expectations are curator-authored from policy intent.
  acceptanceNotes:
    - Smoke needs at least one stable approval-prompt path.
  maintainerNotes:
    - Keep runner execution blocked behind the approval boundary.
suiteIds:
  - smoke
tags:
  - smoke
  - ci-safe
  - policy
  - approval
execution:
  mode: ci_safe
  runner: fake
  approvalMode: fail
  repoFixturePath: benchmarks/fixtures/repos/control-plane-template
  ciSafe: true
input:
  kind: markdown_spec
  specFixturePath: benchmarks/fixtures/specs/smoke/smoke-policy-prompt.md
  targetPath: benchmarks/specs/smoke-policy-prompt.md
expected:
  runStatus: awaiting_approval
  policyDecision: prompt
  approvalState: pending
  verificationStatus: not_run
  reviewPacketStatus: verification_failed
  requiredArtifacts:
    - run.json
    - session.manifest.json
    - approval-packet.json
    - approval-packet.md
    - review-packet.json
    - review-packet.md
weights:
  success: 0.3
  policy_correctness: 0.2
  verification_correctness: 0.2
  packet_completeness: 0.15
  artifact_presence: 0.15
