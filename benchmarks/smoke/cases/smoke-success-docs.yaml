version: 1
id: smoke-success-docs
title: Successful low-risk docs run completes and verifies
description: Exercises the happy path for a low-risk docs-only governed run in CI-safe mode.
suiteIds:
  - smoke
tags:
  - smoke
  - ci-safe
  - success
  - docs
execution:
  mode: ci_safe
  runner: fake
  approvalMode: fail
  repoFixturePath: benchmarks/fixtures/repos/ci-pass-template
  ciSafe: true
input:
  kind: markdown_spec
  specFixturePath: benchmarks/fixtures/specs/smoke-success-docs.md
  targetPath: benchmarks/specs/smoke-success-docs.md
expected:
  runStatus: completed
  policyDecision: allow
  approvalState: not_required
  verificationStatus: passed
  reviewPacketStatus: ready
  requiredArtifacts:
    - run.json
    - session.manifest.json
    - changed-files.json
    - review-packet.json
    - review-packet.md
    - verification.result.json
weights:
  success: 0.3
  policy_correctness: 0.2
  verification_correctness: 0.2
  packet_completeness: 0.15
  artifact_presence: 0.15
