version: 1
id: smoke-success-triage-notes
title: Triage-style notes task completes and verifies
description: Exercises the triage task class against a deterministic issue-notes target.
metadata:
  sourceType: manual_curation
  sourceProvenance:
    summary: Added during corpus hardening to cover a low-risk triage/documentation task class.
    references:
      - codex_governed_delivery_handoff_spec.md:1334
      - documentation.md:8
  collectionDate: 2026-03-23
  acceptedDate: 2026-03-23
  taskClass: triage
  riskClass: low
  successCriteria:
    - Complete a triage notes update without approval.
    - Pass deterministic verification and persist a ready review packet.
  allowedPolicies:
    - allow
  expectedVerificationCommands:
    - node scripts/pass.mjs lint
    - node scripts/pass.mjs test
  graders:
    - { name: task_completion, metric: success }
    - { name: tests_passing, metric: verification_correctness }
    - { name: policy_violations, metric: policy_correctness }
    - { name: review_packet_fidelity, metric: packet_completeness }
    - { name: artifact_completeness, metric: artifact_presence }
  simplificationNotes:
    - Uses a fixture open-issues note instead of a live backlog system.
  contaminationNotes:
    - Success criteria are defined independently of benchmark output.
  acceptanceNotes:
    - Smoke should explicitly cover a low-risk triage task.
  maintainerNotes:
    - Keep the task docs-only and deterministic.
suiteIds:
  - smoke
tags:
  - smoke
  - ci-safe
  - success
  - triage
execution:
  mode: ci_safe
  runner: fake
  approvalMode: fail
  repoFixturePath: benchmarks/fixtures/repos/control-plane-template
  ciSafe: true
input:
  kind: markdown_spec
  specFixturePath: benchmarks/fixtures/specs/smoke/smoke-success-triage-notes.md
  targetPath: benchmarks/specs/smoke-success-triage-notes.md
expected:
  runStatus: completed
  policyDecision: allow
  approvalState: not_required
  verificationStatus: passed
  reviewPacketStatus: ready
  requiredArtifacts:
    - run.json
    - session.manifest.json
    - changed-files.json
    - review-packet.json
    - review-packet.md
    - verification.result.json
weights:
  success: 0.3
  policy_correctness: 0.2
  verification_correctness: 0.2
  packet_completeness: 0.15
  artifact_presence: 0.15
